version: '3.8'

services:
  # 1. SQL Server Baza
  nuaspa-db:
    image: mcr.microsoft.com/mssql/server:2022-latest
    container_name: nuaspa-db-container
    environment:
      - ACCEPT_EULA=Y
      - MSSQL_SA_PASSWORD=YourStrongPassword123!
    ports:
      - "1433:1433"
    networks:
      - nuaspa-network

  # 2. RabbitMQ - Message Broker
  rabbitmq:
    image: rabbitmq:3-management
    container_name: rabbitmq-nuaspa
    ports:
      - "5672:5672"   # Port za komunikaciju (AMQP)
      - "15672:15672" # Port za Management Dashboard (UI)
    environment:
      - RABBITMQ_DEFAULT_USER=guest
      - RABBITMQ_DEFAULT_PASS=guest
    networks:
      - nuaspa-network

  # 3. Tvoj .NET API
  nuaspa-api:
    image: nuaspa-api-image
    build:
      context: .
      dockerfile: Dockerfile
    container_name: nuaspa-api-container
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
      - ConnectionStrings__DefaultConnection=Server=nuaspa-db;Database=210240;User Id=sa;Password=YourStrongPassword123!;TrustServerCertificate=True;
      # Dodajemo adresu za RabbitMQ (unutar mreže koristimo ime servisa)
      - RabbitMQ__Host=rabbitmq
      - RabbitMQ__Port=5672
      - RabbitMQ__UserName=guest
      - RabbitMQ__Password=guest
      - RabbitMQ__NotificationsQueue=nuaspa_notifications
    ports:
      - "8080:8080"
    depends_on:
      - nuaspa-db
      - rabbitmq
    networks:
      - nuaspa-network

  # 4. Pomoćni servis — RabbitMQ consumer (e-mail, notifikacije)
  nuaspa-worker:
    image: nuaspa-worker-image
    build:
      context: .
      dockerfile: Dockerfile.worker
    container_name: nuaspa-worker-container
    environment:
      - DOTNET_ENVIRONMENT=Development
      - RabbitMQ__Host=rabbitmq
      - RabbitMQ__Port=5672
      - RabbitMQ__UserName=guest
      - RabbitMQ__Password=guest
      - RabbitMQ__NotificationsQueue=nuaspa_notifications
      - Email__OutboxDirectory=/app/email-outbox
      - Smtp__Enabled=false
    volumes:
      - worker-email-outbox:/app/email-outbox
    depends_on:
      - rabbitmq
    networks:
      - nuaspa-network

volumes:
  worker-email-outbox:

networks:
  nuaspa-network:
    driver: bridge